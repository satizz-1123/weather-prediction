<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Weather Prediction System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
padding:20px;
text-align:center;
transition:0.5s;
}

.sun-bg{
background:linear-gradient(#fceabb,#f8b500);
}

.rain-bg{
background:#0f2027;
}

.container{
background:white;
padding:20px;
border-radius:12px;
max-width:650px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
border:none;
background:#4CAF50;
color:white;
border-radius:6px;
cursor:pointer;
margin:10px;
}

button:hover{
background:#43a047;
}

#animation{
font-size:60px;
margin-top:10px;
}

#map{
height:400px;
margin-top:20px;
border-radius:10px;
}

canvas{
margin-top:20px;
}

#rainCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

</style>

</head>


<body class="sun-bg">

<canvas id="rainCanvas"></canvas>

<div class="container">

<h2>🌦 AI Weather Prediction System</h2>

<input type="text" id="city" placeholder="Enter City">

<br>

<button onclick="getWeather()">Get Live Weather</button>

<br><br>

<div style="display:grid;grid-template-columns:2fr 1fr;gap:10px;align-items:center">

<input type="number" id="temperature" placeholder="Enter value">
<span>🌡 Temperature (°C)</span>

<input type="number" id="humidity" placeholder="Enter value">
<span>💧 Humidity (%)</span>

<input type="number" id="pressure" placeholder="Enter value">
<span>📉 Pressure (hPa)</span>

<input type="number" id="wind" placeholder="Enter value">
<span>🌬 Wind Speed (m/s)</span>

</div>

<br>

<button onclick="predictWeather()">Predict Weather</button>

<h3 id="result"></h3>

<div id="animation"></div>

<canvas id="weatherChart"></canvas>

<div id="map"></div>

</div>


<script>

let chart;


// AI Prediction Model
function aiPrediction(temp,humidity,pressure,wind){

let score=0;

score+=humidity*0.4;
score+=(1015-pressure)*2;
score+=wind*2;
score+=(30-temp)*1.5;

let probability=Math.min(Math.max(score/5,0),100);

return probability;

}


// Prediction Function
function predictWeather(){

let temp=parseFloat(document.getElementById("temperature").value);
let humidity=parseFloat(document.getElementById("humidity").value);
let pressure=parseFloat(document.getElementById("pressure").value);
let wind=parseFloat(document.getElementById("wind").value);

let probability=aiPrediction(temp,humidity,pressure,wind);

document.getElementById("result").innerHTML=
"Rain Probability: "+probability.toFixed(1)+"%";

let animation=document.getElementById("animation");

if(probability>50){

animation.innerHTML="🌧🌧🌧";
document.body.className="rain-bg";
document.getElementById("rainCanvas").style.display="block";

}
else{

animation.innerHTML="☀☀☀";
document.body.className="sun-bg";
document.getElementById("rainCanvas").style.display="none";

}

updateGraph(temp,humidity,pressure,wind);

}


// Graph
function updateGraph(temp,humidity,pressure,wind){

let data=[temp,humidity,pressure,wind];

if(chart){

chart.data.datasets[0].data=data;
chart.update();

}
else{

const ctx=document.getElementById("weatherChart");

chart=new Chart(ctx,{
type:'bar',
data:{
labels:['Temperature','Humidity','Pressure','Wind'],
datasets:[{
label:'Weather Parameters',
data:data
}]
}
});

}

}


// Weather API
async function getWeather(){

let city=document.getElementById("city").value;

let api="https://api.openweathermap.org/data/2.5/weather?q="+city+"&appid=f519244ce7fb08e08b6cd8691a120bf0&units=metric";

let response=await fetch(api);
let data=await response.json();

document.getElementById("temperature").value=data.main.temp;
document.getElementById("humidity").value=data.main.humidity;
document.getElementById("pressure").value=data.main.pressure;
document.getElementById("wind").value=data.wind.speed;

}


// Map
var map=L.map('map').setView([20,78],4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);


map.on('click', async function(e){

let lat=e.latlng.lat;
let lon=e.latlng.lng;

let api=`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=f519244ce7fb08e08b6cd8691a120bf0&units=metric`;

let response=await fetch(api);
let data=await response.json();

document.getElementById("temperature").value=data.main.temp;
document.getElementById("humidity").value=data.main.humidity;
document.getElementById("pressure").value=data.main.pressure;
document.getElementById("wind").value=data.wind.speed;

predictWeather();

});


// Rain Animation
const canvas=document.getElementById("rainCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let rain=[];

for(let i=0;i<300;i++){

rain.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
length:Math.random()*20+10,
speed:Math.random()*6+4
});

}

function drawRain(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.strokeStyle="rgba(174,194,224,0.5)";
ctx.lineWidth=1;

for(let i=0;i<rain.length;i++){

let r=rain[i];

ctx.beginPath();
ctx.moveTo(r.x,r.y);
ctx.lineTo(r.x,r.y+r.length);
ctx.stroke();

r.y+=r.speed;

if(r.y>canvas.height){
r.y=-20;
r.x=Math.random()*canvas.width;
}

}

requestAnimationFrame(drawRain);

}

drawRain();


// Lightning
setInterval(function(){

if(Math.random()>0.96){

document.body.style.backgroundColor="white";

setTimeout(()=>{
document.body.style.backgroundColor="";
},100);

}

},300);

</script>

</body>
</html>
