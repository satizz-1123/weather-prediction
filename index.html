<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Weather Prediction 🌦️</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(to right, #00c6ff, #0072ff);
  color: #fff;
  text-align: center;
  padding: 50px 20px;
}
input, button {
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}
button {
  background: linear-gradient(to right, #ff4d6d, #ff758c);
  color: white;
  cursor: pointer;
  transition: transform 0.2s;
}
button:hover {
  transform: scale(1.05);
}
.result {
  margin-top: 20px;
  font-size: 24px;
  font-weight: bold;
  animation: pop 0.6s ease;
}
@keyframes pop {
  0% {transform: scale(0.5); opacity: 0;}
  70% {transform: scale(1.2);}
  100% {transform: scale(1); opacity: 1;}
}
</style>
</head>
<body>

<h1>Quantum Weather Prediction 🌦️</h1>
<p>Enter current weather details:</p>
<input id="temp" type="number" placeholder="Temperature (°C)" /><br>
<input id="humidity" type="number" placeholder="Humidity (%)" /><br>
<input id="pressure" type="number" placeholder="Pressure (hPa)" /><br>
<input id="wind" type="number" placeholder="Wind speed (m/s)" /><br>
<button onclick="predictWeather()">Predict Weather</button>

<div id="result" class="result"></div>

<script>
function predictWeather() {
  let temp = parseFloat(document.getElementById('temp').value);
  let humidity = parseFloat(document.getElementById('humidity').value);
  let pressure = parseFloat(document.getElementById('pressure').value);
  let wind = parseFloat(document.getElementById('wind').value);

  // Encode real values to binary (simulate quantum encoding)
  let tempBit = temp > 30 ? 1 : 0;
  let humidityBit = humidity > 70 ? 1 : 0;
  let pressureBit = pressure < 1010 ? 0 : 1;
  let windBit = wind > 5 ? 1 : 0;

  // Simple oracle logic: rain if humidityBit==1 && pressureBit==0
  let rain = (humidityBit === 1 && pressureBit === 0);
  let resultDiv = document.getElementById('result');

  if (rain) {
    resultDiv.innerHTML = "🌧️ Prediction: RAIN";
  } else {
    resultDiv.innerHTML = "☀️ Prediction: NO RAIN";
  }
}
</script>

</body>
</html>
